name: Petswap
options:
  bundleIdPrefix: com.shimondeitel.fosterlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Petswap:
    type: application
    platform: iOS
    sources:
      - path: Petswap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fosterlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Petswap/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PetswapTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PetswapTests
      - path: Petswap.storekit
    dependencies:
      - target: Petswap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fosterlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PetswapUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PetswapUITests
    dependencies:
      - target: Petswap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fosterlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Petswap:
    build:
      targets:
        Petswap: all
        PetswapTests: [test]
        PetswapUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Petswap.storekit
    test:
      config: Debug
      storeKitConfiguration: Petswap.storekit
      targets:
        - PetswapTests
        - PetswapUITests
    archive:
      config: Release
